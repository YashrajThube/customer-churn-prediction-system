name: QA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: churn-ai-platform
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Backend lint
        working-directory: churn-ai-platform
        run: python -m ruff check backend

      - name: Backend tests with coverage
        working-directory: churn-ai-platform
        run: python -m pytest --cov=backend --cov-report=xml --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: churn-ai-platform/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: churn-ai-platform/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: churn-ai-platform/frontend
        run: npm run lint -- --max-warnings 0

      - name: Frontend tests with coverage
        working-directory: churn-ai-platform/frontend
        run: npm run test:coverage

      - name: Frontend build
        working-directory: churn-ai-platform/frontend
        run: npm run build